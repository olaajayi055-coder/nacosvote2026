<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NACOS Admin Dashboard</title>
    <style>
        :root { --dark: #0f2e1a; --gold: #ffd700; --green: #2ecc71; --red: #e74c3c; --gray: #95a5a6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; min-height: 100vh; }
        #loginScreen { display: flex; height: 100vh; justify-content: center; align-items: center; background: linear-gradient(135deg, var(--dark), var(--green)); }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        .login-box h2 { color: var(--dark); margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid var(--gold); border-radius: 8px; font-size: 16px; }
        .login-box button { width: 100%; padding: 14px; background: var(--gold); color: var(--dark); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #dashboard { display: none; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: rgba(0,0,0,0.3); padding: 25px; overflow-y: auto; z-index: 10; }
        .sidebar h2 { color: var(--gold); margin-bottom: 30px; }
        .menu-item { padding: 12px 15px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .menu-item:hover, .menu-item.active { background: var(--gold); color: var(--dark); }
        .main-content { margin-left: 250px; padding: 30px; }
        .header { background: rgba(255,215,0,0.1); padding: 20px; border-radius: 12px; margin-bottom: 30px; border-left: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 12px; border-left: 5px solid var(--green); }
        .stat-card h3 { color: var(--gray); font-size: 0.85em; margin-bottom: 8px; }
        .stat-card .value { font-size: 2.2em; font-weight: bold; color: var(--gold); }
        .stat-card.revenue { border-color: var(--gold); }
        .section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; }
        .section.active { display: block; }
        .section h2 { color: var(--gold); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,215,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(255,215,0,0.2); color: var(--gold); font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .badge-success { background: var(--green); color: #fff; }
        .badge-pending { background: #f39c12; color: #fff; }
        .verify-btn { background: var(--gold); color: var(--dark); padding: 5px 10px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; font-size: 0.8em; }
        .refresh-btn { background: var(--gold); color: var(--dark); padding: 8px 15px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .votes-count { background: var(--gold); color: var(--dark); padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .receipt-link { color: var(--gold); text-decoration: none; }
        .receipt-link:hover { text-decoration: underline; }
        .debug-box { background: #222; padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.8em; max-height: 200px; overflow-y: auto; display: none; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; } table { display: block; overflow-x: auto; } }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <h2>🔐 Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Admin Password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <h2>🏆 NACOS Admin</h2>
            <div class="menu-item active" onclick="showSection('overview')">📊 Overview</div>
            <div class="menu-item" onclick="showSection('payments')">💰 Payments Log</div>
            <div class="menu-item" onclick="showSection('votes')">🗳️ Votes Breakdown</div>
            <div class="menu-item" onclick="toggleDebug()">🐛 Debug Data</div>
            <div class="menu-item" onclick="logout()">🚪 Logout</div>
        </div>

        <div class="main-content">
            <div class="header">
                <div>
                    <h1>📈 Dashboard</h1>
                    <p>Real-time voting & payment tracking</p>
                </div>
                <button class="refresh-btn" onclick="forceRefresh()">↻ Force Refresh</button>
            </div>

            <div id="overview" class="section active">
                <div class="stats-grid">
                    <div class="stat-card"><h3>Total Payments</h3><div class="value" id="totalPayments">0</div></div>
                    <div class="stat-card"><h3>Verified</h3><div class="value" id="verifiedVoters">0</div></div>
                    <div class="stat-card"><h3>Total Votes</h3><div class="value" id="votesCast">0</div></div>
                    <div class="stat-card revenue"><h3>Revenue</h3><div class="value" id="estRevenue">₦0</div></div>
                </div>
            </div>

            <div id="payments" class="section">
                <h2>💰 Payments Log</h2>
                <div id="paymentsTable"></div>
            </div>

            <div id="votes" class="section">
                <h2>🗳️ Votes Breakdown</h2>
                <div id="votesTable"></div>
            </div>

            <div id="debugPanel" class="debug-box"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzclJyqHl2OnwXPidkvFhHKStdJugn9uCcnrqu4c7-pFjYO0Z07_WL_-9B2r1S-E7K1ow/exec';
        const ADMIN_PASSWORD = 'nacosadmin';
        let rawData = { payments: [], votes: [] };

        function login() {
            if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadDashboard();
            } else { alert('❌ Wrong password'); }
        }
        function logout() { location.reload(); }
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }
        function toggleDebug() {
            const panel = document.getElementById('debugPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            if(panel.style.display === 'block') panel.textContent = JSON.stringify(rawData, null, 2);
        }

        async function forceRefresh() {
            localStorage.clear();
            sessionStorage.clear();
            await loadDashboard(true);
        }

        async function loadDashboard(showAlert = false) {
            try {
                const res = await fetch(BACKEND_URL + '?action=getData&t=' + Date.now() + '&r=' + Math.random());
                const data = await res.json();
                
                if (data.status !== 'success') throw new Error(data.message || 'Fetch failed');
                
                rawData = data;
                rawData.payments = data.payments || [];
                rawData.votes = data.votes || [];
                
                renderStats();
                renderPayments();
                renderVotes();
                
                if(showAlert) alert(`✅ Refreshed! Payments: ${rawData.payments.length} | Votes: ${rawData.votes.length}`);
            } catch (err) {
                alert('❌ Error: ' + err.message);
                console.error(err);
            }
        }

        function renderStats() {
            document.getElementById('totalPayments').textContent = rawData.payments.length;
            document.getElementById('verifiedVoters').textContent = rawData.payments.filter(r => r[5] && String(r[5]).toLowerCase() === 'verified').length;
            
            let totalVotes = 0;
            rawData.votes.forEach(r => { totalVotes += Number(r[5]) || 0; });
            document.getElementById('votesCast').textContent = totalVotes;
            
            const rev = rawData.payments.reduce((s, r) => s + (Number(r[4]) || 0), 0);
            document.getElementById('estRevenue').textContent = '₦' + rev.toLocaleString();
        }

        function renderPayments() {
            const c = document.getElementById('paymentsTable');
            if (!rawData.payments.length) { c.innerHTML = '<p style="padding:20px;color:#95a5a6">No payments yet</p>'; return; }
            
            let h = '<table><thead><tr><th>Date</th><th>Name</th><th>TransRef</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>';
            rawData.payments.forEach(r => {
                const date = r[0] ? new Date(r[0]).toLocaleString() : '-';
                const ref = r[3] || '-';
                const amt = r[4] ? '₦' + Number(r[4]).toLocaleString() : '₦0';
                const stat = r[5] || 'pending';
                const badge = String(stat).toLowerCase() === 'verified' ? '<span class="badge badge-success">Verified</span>' : '<span class="badge badge-pending">Pending</span>';
                const btn = String(stat).toLowerCase() !== 'verified' ? `<button class="verify-btn" onclick="verifyPayment('${ref}')">✓ Verify</button>` : '✓';
                h += `<tr><td>${date}</td><td>${r[1]||'-'}</td><td style="font-family:monospace">${ref}</td><td>${amt}</td><td>${badge}</td><td>${btn}</td></tr>`;
            });
            c.innerHTML = h + '</tbody></table>';
        }

        function renderVotes() {
            const c = document.getElementById('votesTable');
            if (!rawData.votes.length) { c.innerHTML = '<p style="padding:20px;color:#95a5a6">No votes yet</p>'; return; }
            
            let h = '<table><thead><tr><th>Voter</th><th>Category</th><th>Nominee</th><th>Votes</th><th>Amount</th></tr></thead><tbody>';
            rawData.votes.forEach(r => {
                const qty = Number(r[5]) || 0;
                const amt = r[6] ? '₦' + Number(r[6]).toLocaleString() : '₦0';
                h += `<tr><td>${r[1]||'-'}</td><td>${r[3]||'-'}</td><td>${r[4]||'-'}</td><td><span class="votes-count">${qty}</span></td><td>${amt}</td></tr>`;
            });
            c.innerHTML = h + '</tbody></table>';
        }

        async function verifyPayment(ref) {
            if(!confirm('Verify this payment?')) return;
            try {
                const res = await fetch(BACKEND_URL, { method: 'POST', body: JSON.stringify({ action: 'verifyPayment', transRef: ref }) });
                const d = await res.json();
                if(d.status === 'success') { alert('✅ Verified'); loadDashboard(); }
                else alert('❌ ' + d.message);
            } catch(e) { alert('❌ Network error'); }
        }

        // Auto-refresh every 20 seconds
        setInterval(() => loadDashboard(), 20000);
    </script>
</body>
</html>
